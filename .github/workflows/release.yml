name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    # A push whose head commit was authored by this workflow (e.g. the
    # "docs: regenerate changelog [skip ci]" commit) is the workflow's own
    # output and must not re-trigger it. Honor the [skip ci] convention.
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --force --tags origin
      - name: Create tag
        id: tag
        run: |
          tag="$(bash bin/release-tag)"
          printf 'tag=%s\n' "${tag}" >> "${GITHUB_OUTPUT}"
      - name: Push tag
        run: git push origin "refs/tags/${{ steps.tag.outputs.tag }}"
      - name: Bump pubspec
        run: |
          version="${{ steps.tag.outputs.tag }}"
          version="${version#v}"
          bash -c "source lib/release.sh && release_bump_pubspec '${version}'"
      - name: Commit pubspec
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet pubspec.yaml || \
            git commit -m "release: ${{ steps.tag.outputs.tag }}" pubspec.yaml
      - name: Generate changelog
        run: bash bin/generate-changelog CHANGELOG.md
      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet CHANGELOG.md || \
            git commit -m "docs: regenerate changelog [skip ci]" CHANGELOG.md
      - name: Push commits
        run: git push origin HEAD:master